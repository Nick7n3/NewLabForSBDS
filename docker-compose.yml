version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cynosure
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  cnc:
    build:
      context: .
      dockerfile: Dockerfile.cnc
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGO_URL: mongodb://mongodb:27017
      CNC_PORT: "9000"
    ports:
      - "9000:9000"

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      cnc:
        condition: service_started
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/cynosure
      CLIENT_PORT: "8080"
      CNC_URL: http://cnc:9000
      JWT_SECRET: "change-me-in-production-32chars+"
      HMAC_KEY: "change-me-in-production-hmac-key"
    ports:
      - "8080:8080"

  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    restart: unless-stopped
    depends_on:
      - cnc
    environment:
      CNC_URL: http://cnc:9000

volumes:
  pgdata:
  mongodata:
